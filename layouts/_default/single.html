{{ define "main" }}
<article class="max-w-3xl mx-auto px-6 pt-16 pb-12">
  <h1 class="text-3xl font-bold text-zinc-900 dark:text-zinc-100 mb-4">{{ .Title }}</h1>
  {{ with .Params.profile }}
    <img src="{{ . }}" class="w-64 h-64 rounded-lg object-cover mb-6">
  {{ end }}
  {{ with .Date }}<time class="text-sm text-zinc-400 dark:text-zinc-500">{{ .Format "January 2, 2006" }}</time>{{ end }}
  <div class="mt-8 prose prose-zinc dark:prose-invert prose-emerald max-w-none
    prose-a:text-emerald-600 dark:prose-a:text-emerald-400
    prose-code:text-emerald-700 dark:prose-code:text-emerald-300
    prose-pre:bg-zinc-100 dark:prose-pre:bg-zinc-900 prose-pre:border prose-pre:border-zinc-200 dark:prose-pre:border-zinc-800">
    {{ .Content }}
  </div>
</article>
{{ end }}
